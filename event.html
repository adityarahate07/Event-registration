<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>
</head>

<body>

    <h1 align="center">🎉 Event Registration Form</h1>

    <hr>

    <form>

        <fieldset>
            <legend><b>Personal Information</b></legend>

            <label>Full Name:</label><br>
            <input type="text" name="name"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" name="phone"><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </fieldset>

        <br>

        <fieldset>
            <legend><b>Event Details</b></legend>

            <label>Select Event:</label><br>
            <select>
                <option>Technical Workshop</option>
                <option>Coding Competition</option>
                <option>Seminar</option>
            </select><br><br>

            <label>Ticket Type:</label><br>
            <input type="radio" name="ticket"> VIP
            <input type="radio" name="ticket"> Standard
            <input type="radio" name="ticket"> Student<br><br>

            <label>Event Date:</label><br>
            <input type="date"><br><br>

            <label>Upload ID Proof:</label><br>
            <input type="file">
        </fieldset>

        <br>

        <fieldset>
            <legend><b>Additional Information</b></legend>

            <label>Address:</label><br>
            <textarea rows="4" cols="40"></textarea><br><br>

            <label>Skills:</label><br>
            <input type="checkbox"> Programming
            <input type="checkbox"> Designing
            <input type="checkbox"> Communication<br><br>

            <label>How did you hear about us?</label><br>
            <select>
                <option>Social Media</option>
                <option>Friend</option>
                <option>Advertisement</option>
            </select>
        </fieldset>

        <br>

        <center>
            <input type="submit" value="Register">
            <input type="reset" value="Clear">
        </center>

    </form>

    <hr>

    <footer align="center">
        <p>© 2025 Event Management System</p>
    </footer

</body>
</html>
